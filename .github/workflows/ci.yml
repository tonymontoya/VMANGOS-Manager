name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Shellcheck
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run installer shellcheck
        run: shellcheck vmangos_setup.sh auto_install.sh tests/installer/run_tests.sh

      - name: Run manager shellcheck
        working-directory: ./manager
        run: make lint

  test:
    name: Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run installer tests
        run: bash tests/installer/run_tests.sh

      - name: Run manager tests
        working-directory: ./manager
        run: make test
